<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Pressure Belts Drag & Drop Game</title>

<style>
body{
    font-family:"Times New Roman", serif;
    background:#FFF9CC;
    text-align:center;
    margin:20px;
}

h1{
    color:#003366;
    margin-bottom:10px;
}

.info{
    font-size:24px;
    font-weight:bold;
    margin:10px;
}

.container{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
    margin-top:20px;
}

.drag-area{
    width:320px;
    min-height:450px;
    padding:15px;
    border:3px solid #666;
    background:white;
    border-radius:10px;
}

.drag-item{
    padding:10px;
    margin:8px 0;
    border:1px solid #444;
    background:#f8f8f8;
    border-radius:5px;
    cursor:grab;
    font-weight:bold;
}

.drag-item:hover{
    background:#e8f0ff;
}

.game-board{
    width:450px;
    padding:20px;
    border:4px solid #666;
    border-radius:50%;
    background:white;
}

.drop-zone{
    height:50px;
    margin:10px 0;
    border:2px dashed #888;
    border-radius:5px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    background:#fafafa;
}

.correct{
    background:#c8f7c8;
    border-color:green;
}

.wrong{
    background:#ffd6d6;
}

#message{
    margin-top:20px;
    font-size:26px;
    font-weight:bold;
    color:green;
}

button{
    padding:10px 20px;
    font-size:18px;
    margin-top:15px;
    cursor:pointer;
    border:none;
    background:#003366;
    color:white;
    border-radius:5px;
}

button:hover{
    background:#0055aa;
}
</style>
</head>

<body>

<h1>GLOBAL PRESSURE BELTS</h1>

<div class="info">
⏰ Time Left: <span id="timer">60</span> Seconds
</div>

<div class="info">
⭐ Score: <span id="score">0</span> / 7
</div>

<div class="container">

    <!-- Draggable Belts -->
    <div class="drag-area" id="dragArea"></div>

    <!-- Globe -->
    <div class="game-board">

        <div class="drop-zone" data-answer="Polar High Pressure Belt">
            90° N
        </div>

        <div class="drop-zone" data-answer="Sub Polar Low Pressure Belt">
            60° N
        </div>

        <div class="drop-zone" data-answer="Sub Tropical High Pressure Belt">
            30° N
        </div>

        <div class="drop-zone" data-answer="Equatorial Low Pressure Belt">
            0°
        </div>

        <div class="drop-zone" data-answer="Sub Tropical High Pressure Belt">
            30° S
        </div>

        <div class="drop-zone" data-answer="Sub Polar Low Pressure Belt">
            60° S
        </div>

        <div class="drop-zone" data-answer="Polar High Pressure Belt">
            90° S
        </div>

    </div>

</div>

<div id="message"></div>

<button onclick="location.reload()">🔄 Play Again</button>

<script>

// Game Variables
let score = 0;
let timeLeft = 60;
let gameOver = false;
let draggedItem = null;

// Pressure Belts
const belts = [
    "Polar High Pressure Belt",
    "Sub Polar Low Pressure Belt",
    "Sub Tropical High Pressure Belt",
    "Equatorial Low Pressure Belt",
    "Sub Tropical High Pressure Belt",
    "Sub Polar Low Pressure Belt",
    "Polar High Pressure Belt"
];

// Shuffle Function
function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

// Shuffle Belts
shuffle(belts);

// Create Draggable Items
const dragArea = document.getElementById("dragArea");

belts.forEach((belt,index)=>{

    const div = document.createElement("div");

    div.className = "drag-item";
    div.draggable = true;
    div.id = "belt"+index;
    div.innerText = belt;

    div.addEventListener("dragstart",()=>{
        if(!gameOver){
            draggedItem = div;
        }
    });

    dragArea.appendChild(div);

});

// Timer
const timer = setInterval(()=>{

    timeLeft--;

    document.getElementById("timer").textContent = timeLeft;

    if(timeLeft <= 0){

        clearInterval(timer);

        gameOver = true;

        document.getElementById("message").innerHTML =
        "⏰ TIME OVER! Your Score: " + score + " / 7";

    }

},1000);

// Drop Logic
document.querySelectorAll(".drop-zone").forEach(zone=>{

    zone.addEventListener("dragover",(e)=>{
        e.preventDefault();
    });

    zone.addEventListener("drop",(e)=>{

        e.preventDefault();

        if(gameOver) return;

        if(
            draggedItem &&
            draggedItem.innerText.trim() === zone.dataset.answer &&
            zone.children.length === 0
        ){

            zone.innerHTML = "";
            zone.appendChild(draggedItem);

            zone.classList.add("correct");

            score++;

            document.getElementById("score").textContent = score;

            checkCompletion();

        }else{

            zone.classList.add("wrong");

            setTimeout(()=>{
                zone.classList.remove("wrong");
            },500);

        }

    });

});

// Completion Check
function checkCompletion(){

    if(score === 7){

        clearInterval(timer);

        gameOver = true;

        document.getElementById("message").innerHTML =
        "🎉 EXCELLENT! You Scored 7 / 7";

    }

}

</script>

</body>
</html>
